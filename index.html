<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Malaysian Restaurant – Order System</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Malaysian Restaurant</h1>
            <p class="subtitle">Authentic Malaysian cuisine</p>
        </header>
        
        <!-- Cart Icon -->
        <div class="cart-container">
            <div class="cart-icon">
                <i class="fas fa-shopping-cart"></i>
                <span class="cart-count">0</span>
            </div>
        </div>
        
        <!-- Category Filter Bar -->
        <div class="category-filter" id="categoryFilter">
            <!-- Generated by JS -->
        </div>
        
        <!-- Product Grid -->
        <div class="product-grid" id="productGrid">
            <!-- Generated by JS -->
        </div>
        
        <!-- Cart Sidebar -->
        <div class="cart-sidebar" id="cartModal">
            <div class="cart-header">
                <h3>Your Cart</h3>
                <button id="closeCart" class="close-cart"><i class="fas fa-times"></i></button>
            </div>
            <div class="cart-items" id="cartItems"></div>
            <div class="cart-footer">
                <div class="cart-total">
                    <span>Total:</span>
                    <span id="cartTotal">RM 0.00</span>
                </div>
                <button class="checkout-btn" id="checkoutBtn">Proceed to Checkout</button>
            </div>
        </div>

        <!-- Order Summary & Payment Modal -->
        <div class="summary-modal" id="summaryModal">
            <div class="summary-content" id="summaryContent">
                <!-- Order Summary Step -->
                <div class="summary-step" id="summaryStep">
                    <div class="summary-header">
                        <h3>Order Summary</h3>
                        <button class="close-summary" id="closeSummary"><i class="fas fa-arrow-left"></i> Back</button>
                    </div>
                    <div class="summary-details">
                        <table class="summary-table">
                            <thead>
                                <tr>
                                    <th>Code</th>
                                    <th>Name</th>
                                    <th>Price</th>
                                    <th>Qty</th>
                                    <th>Total</th>
                                </tr>
                            </thead>
                            <tbody id="summaryItems"></tbody>
                        </table>
                    </div>
                    <div class="summary-total">
                        <span>Total:</span>
                        <span id="summaryTotal">RM 0.00</span>
                    </div>
                    <div class="summary-instructions" id="summaryContact"></div>
                    <div class="summary-buttons">
                        <button id="screenshotBtn"><i class="fas fa-camera"></i> Capture Screenshot</button>
                        <button id="submitOrderBtn"><i class="fas fa-paper-plane"></i> Submit Order</button>
                    </div>
                </div>
                
                <!-- Payment Step (shown after successful order) -->
                <div class="payment-step" id="paymentStep">
                    <div class="payment-header">
                        <h3>Order Submitted!</h3>
                        <p>Your order has been sent to the kitchen.<br>Complete payment using one of the methods below.</p>
                    </div>
                    
                    <div class="payment-options">
                        <button class="payment-option" data-method="mae">
                            <i class="fas fa-mobile-alt"></i> MAE
                        </button>
                        <button class="payment-option" data-method="tng">
                            <i class="fas fa-wallet"></i> TNG
                        </button>
                    </div>
                    
                    <div class="qr-container" id="maeQrContainer">
                        <div class="qr-code">
                            <img id="maeQrImage" src="" alt="MAE QR Code">
                        </div>
                        <p>Scan to pay with MAE</p>
                    </div>
                    
                    <div class="qr-container" id="tngQrContainer">
                        <div class="qr-code">
                            <img id="tngQrImage" src="" alt="TNG QR Code">
                        </div>
                        <p>Scan to pay with Touch 'n Go</p>
                    </div>
                    
                    <div class="payment-instructions" id="paymentInstructionsText">
                        <!-- Filled dynamically -->
                    </div>
                    
                    <div class="payment-buttons">
                        <button id="backToSummaryBtn" class="payment-action-btn back"><i class="fas fa-arrow-left"></i> Back to Summary</button>
                        <button id="newOrderBtn" class="payment-action-btn new-order"><i class="fas fa-shopping-cart"></i> New Order</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
